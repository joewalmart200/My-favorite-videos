<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>My Video Hub</title>

<link rel="preconnect" href="https://www.youtube.com">
<link rel="preconnect" href="https://img.youtube.com">

<style>
  body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: #0f0f0f;
    color: white;
  }

  h1 {
    text-align: center;
    padding: 20px;
    font-size: 28px;
  }

  .grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
    gap: 15px;
    padding: 20px;
  }

  .card {
    cursor: pointer;
    position: relative;
    transition: transform 0.2s;
  }

  .card:hover {
    transform: scale(1.05);
  }

  .card img {
    width: 100%;
    border-radius: 12px;
  }

  .play {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    font-size: 40px;
    opacity: 0.8;
  }

  .player {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: rgba(0,0,0,0.95);
    display: none;
    justify-content: center;
    align-items: center;
  }

  .player iframe {
    width: 80%;
    height: 80%;
    border-radius: 12px;
    border: none;
  }

  .close {
    position: absolute;
    top: 20px;
    right: 30px;
    font-size: 30px;
    cursor: pointer;
  }
</style>
</head>

<body>

<h1>🎬 My Video Hub</h1>

<div class="grid" id="grid"></div>

<div class="player" id="player">
  <span class="close" onclick="closePlayer()">✖</span>
  <iframe id="frame"></iframe>
</div>

<script>
const videos = [
  "c745E7T_Wvg",
  "npH8zAMwnNo",
  "Y71IxUCFjzc",
  "5ItVlCoWiRw",
  "7L7bfcwomNg",
  "ZpZ8rW0mONk",
  "SdEaZSCTTyI",
  "2YdPIB7wVFk",
  "XDsYPXRCXAs",
  "bNulp6cDqUU",

  // NEW ONES YOU SENT
  "qkFYqY3vr84",
  "dmLSJrA0n9w",
  "mOJlg8g8_yw",
  "po9aCHS2kfc",
  "-e6xOBCAVvA",
  "_xrkcDPu6Bk",
  "-Ta80mqCuJs",
  "BlevvVl46wk",
  "KNFHIYSxBBs"
];

const grid = document.getElementById("grid");

videos.forEach(id => {
  const div = document.createElement("div");
  div.className = "card";

  div.innerHTML = `
    <img loading="lazy" src="https://img.youtube.com/vi/${id}/mqdefault.jpg">
    <div class="play">▶</div>
  `;

  div.onclick = () => {
    document.getElementById("player").style.display = "flex";
    document.getElementById("frame").src =
      "https://www.youtube.com/embed/" + id + "?autoplay=1";
  };

  grid.appendChild(div);
});

function closePlayer() {
  document.getElementById("player").style.display = "none";
  document.getElementById("frame").src = "";
}
</script>

</body>
</html>
